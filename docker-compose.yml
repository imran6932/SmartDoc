version: "3.9"

services:
  smartdoc_backend:
    build: ./backend
    container_name: smartdoc_backend
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    volumes:
      - ./backend/vector_stores:/app/vector_stores

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "6380:6380"